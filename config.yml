# Galaxy Profile README Configuration
# Copy this file to config.yml and customize it to make it your own!
#
# Usage:
#   cp config.example.yml config.yml
#   # Edit config.yml with your details
#   python -m generator.main
#
# Demo mode (no API calls, uses this file directly):
#   python -m generator.main --demo

# Your GitHub username (required)
username: IruyCode

# Profile information displayed in the galaxy header
profile:
  name: "YuriBanzato"
  tagline: "Software Developer"
  company: "Inout"
  location: "Lisbon - Portugal"
  bio: |
    Programmer and systems administrator with 4+ years of experience.
    Focused on full-stack development and server management, building solutions that solve real-world problems.
  philosophy: '"The best code is the code that solves real problems."'

# Social links displayed at the bottom of the profile
social:
  email: "yuribanzatodev@gmail.com"
  linkedin: "https://www.linkedin.com/in/yuri-gabriel-banzato-3a702b1b4/"
  website: "https://portfolio.iruycode.com"

# Galaxy arms represent your core focus areas
# Each arm spirals out from the center with its own color and tech items
# Available colors: "synapse_cyan", "dendrite_violet", "axon_amber"
galaxy_arms:
  - name: "Frontend"
    color: "dendrite_violet"
    items:
      - "TypeScript"
      - "React"
      - "CSS"
  - name: "Backend"
    color: "synapse_cyan"
    items:
      - "Python"
      - "Node.js"
      - "PostgreSQL"
  - name: "DevOps"
    color: "axon_amber"
    items:
      - "Docker"
      - "GitHub Actions"
      - "AWS"

# Featured projects shown as constellation stars
# Each project needs:
#   repo: "owner/repo-name"   — GitHub repository path
#   arm: 0-2                  — Which galaxy arm to associate with (index)
#   description: "..."        — Short description shown on the card
projects:
  - repo: "galaxy-dev/nebula-ui"
    arm: 0
    description: "A component library with cosmic design tokens and dark-first theming."
  - repo: "galaxy-dev/stargate-api"
    arm: 1
    description: "High-performance API gateway with built-in observability and caching."

# Theme color overrides (optional — defaults to deep space palette)
# All values must be valid hex color codes (#RRGGBB)
theme:
  void: "#07080D"              # Fundo mais escuro (Midnight)
  nebula: "#0A0F16"            # Fundo dos cards (Grafite)
  star_dust: "#16202E"         # Bordas e divisórias (um tom acima do grafite)
  synapse_cyan: "#4FD2FF"      # Accent 1 → Backend (Ciano neon)
  dendrite_violet: "#2196F3"   # Accent 2 → Frontend (Azul elétrico)
  axon_amber: "#7C5CFF"        # Accent 3 → Infra & IoT (violeta, pra dar contraste)
  text_bright: "#F5F8FC"       # Texto principal (Branco gelo)
  text_dim: "#8FA3BE"          # Texto secundário
  text_faint: "#566579"        # Texto apagado / labels

# Stats configuration — which metrics to show on the telemetry card
stats:
  metrics:
    - "commits"
    - "stars"
    - "prs"
    - "issues"
    - "repos"

# Language display settings
languages:
  exclude:                     # Languages to hide from the telemetry chart
    - "HTML"
    - "CSS"
    - "Shell"
    - "Makefile"
  max_display: 8               # Maximum number of languages to show
